name: CD
on:
  push:
    branches: [ main ]
jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          MAJOR=$(grep 'val majorVersion' app/build.gradle.kts | grep -o '[0-9]*')
          MINOR=$(grep 'val minorVersion' app/build.gradle.kts | grep -o '[0-9]*')
          PATCH=$(grep 'val patchVersion' app/build.gradle.kts | grep -o '[0-9]*')
          echo "name=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
          echo "tag=v$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPU

      - name: Import Secrets from Vault
        uses: hashicorp/vault-action@v2
        with:
          url: https://vault.downops.win
          token: ${{ secrets.VAULT_TOKEN }}
          secrets: |
            secret/data/wallettracker/app KEYSTORE_BASE64 ;
            secret/data/wallettracker/app KEYSTORE_PASSWORD ;
            secret/data/wallettracker/app KEY_PASSWORD ;
            secret/data/wallettracker/app KEY_ALIAS ;
            secret/data/wallettracker/app API_BASE_URL ;
            secret/data/wallettracker/app SIGN_SECRET_WORD

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK
        run: ./gradlew assembleRelease
        env:
          API_BASE_URL: ${{ env.API_BASE_URL }}
          SIGN_SECRET: ${{ env.SIGN_SECRET }}

      - name: Sign APK
        id: sign_apk
        run: |
          BUILD_TOOLS=$(ls /usr/local/lib/android/sdk/build-tools/ | sort -V | tail -1)
          BUILD_TOOLS_DIR="/usr/local/lib/android/sdk/build-tools/$BUILD_TOOLS"
          echo "${{ env.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks
          UNSIGNED_APK=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
          ALIGNED_APK="${UNSIGNED_APK%.apk}-aligned.apk"
          SIGNED_APK="${UNSIGNED_APK%.apk}-signed.apk"
          "$BUILD_TOOLS_DIR/zipalign" -v 4 "$UNSIGNED_APK" "$ALIGNED_APK"
          "$BUILD_TOOLS_DIR/apksigner" sign \
            --ks keystore.jks \
            --ks-pass "pass:${{ env.KEYSTORE_PASSWORD }}" \
            --key-pass "pass:${{ env.KEY_PASSWORD }}" \
            --ks-key-alias "${{ env.KEY_ALIAS }}" \
            --out "$SIGNED_APK" \
            "$ALIGNED_APK"
          rm -f keystore.jks
          echo "signedFile=$SIGNED_APK" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WalletTracker ${{ steps.version.outputs.name }}
          files: ${{ steps.sign_apk.outputs.signedFile }}
          generate_release_notes: true
          make_latest: true
