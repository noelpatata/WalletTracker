name: CD

on:
  push:
    branches: [ main ]

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version
        id: version
        run: |
          MAJOR=$(grep 'val majorVersion' app/build.gradle.kts | grep -o '[0-9]*')
          MINOR=$(grep 'val minorVersion' app/build.gradle.kts | grep -o '[0-9]*')
          PATCH=$(grep 'val patchVersion' app/build.gradle.kts | grep -o '[0-9]*')
          echo "name=$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT
          echo "tag=v$MAJOR.$MINOR.$PATCH" >> $GITHUB_OUTPUT

      - name: Build release APK
        run: ./gradlew assembleRelease

      - name: Sign APK
        id: sign_apk
        uses: r0adkll/sign-android-release@v1
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.KEYSTORE_BASE64 }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WalletTracker ${{ steps.version.outputs.name }}
          files: ${{ steps.sign_apk.outputs.signedReleaseFile }}
          generate_release_notes: true
          make_latest: true
